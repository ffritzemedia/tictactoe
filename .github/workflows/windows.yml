name: windows
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Erlaubt das manuelle Starten des Builds

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Passen Sie dies an Ihre Version an

      - name: Briefcase installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase

      - name: Windows App erstellen
        # 'app' ist das Format, '-p msi' erzeugt den Installer
        run: briefcase package windows app -p msi --no-input

      - name: Installer hochladen (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: dist/*.msi # Pfad zum fertigen Installer
