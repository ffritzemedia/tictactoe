name: Linux Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-dev python3-pip libgtk-3-dev libgirepository1.0-dev libcairo2-dev libpango1.0-dev xvfb libcanberra-gtk3-module

      - name: Install Briefcase
        run: python3 -m pip install --break-system-packages briefcase

      - name: Build and Package
        run: xvfb-run briefcase package linux --no-input

      - name: Upload Linux Package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-package
          path: dist/*.deb
